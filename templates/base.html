<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}筹码峰量化投研平台{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --accent: #3b82f6; --green: #22c55e; --red: #ef4444; --yellow: #eab308; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
        .navbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 0.5rem 1.5rem; }
        .navbar-brand { color: var(--accent) !important; font-weight: 700; font-size: 1.2rem; }
        .nav-link { color: var(--muted) !important; transition: .2s; }
        .nav-link:hover, .nav-link.active { color: var(--text) !important; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 1rem; }
        .card-header { background: transparent; border-bottom: 1px solid var(--border); color: var(--text); font-weight: 600; padding: 0.75rem 1rem; }
        .card-body { padding: 1rem; }
        .stat-value { font-size: 2rem; font-weight: 700; }
        .stat-label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; }
        .text-green { color: var(--green); }
        .text-red { color: var(--red); }
        .text-yellow { color: var(--yellow); }
        .btn-primary { background: var(--accent); border-color: var(--accent); }
        .badge-lock { background: #1e40af; color: #93c5fd; }
        .badge-diverge { background: #854d0e; color: #fcd34d; }
        .badge-dispatch { background: #7f1d1d; color: #fca5a5; }
        .badge-build { background: #14532d; color: #86efac; }
        .table { color: var(--text); }
        .table thead th { color: var(--muted); border-color: var(--border); font-size: 0.85rem; }
        .table td { border-color: var(--border); vertical-align: middle; }
        pre { background: #0f172a; color: #e2e8f0; padding: 0.5rem; border-radius: 6px; font-size: 0.85rem; }
        .toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 9999; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">📊 筹码峰量化平台</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">📈 仪表盘</a></li>
                    <li class="nav-item"><a class="nav-link" href="/watchlist">⭐ 选股池</a></li>
                    <li class="nav-item"><a class="nav-link" href="/backtest">🔄 回测</a></li>
                    <li class="nav-item"><a class="nav-link" href="/review">📊 复盘</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid p-4">
        {% block content %}{% endblock %}
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toast(msg, type='info') {
            const colors = {info:'#3b82f6',success:'#22c55e',error:'#ef4444',warning:'#eab308'};
            const el = document.createElement('div');
            el.className = 'toast align-items-center border-0 show';
            el.style.cssText = `background:${colors[type]||colors.info};color:white;margin-bottom:0.5rem;`;
            el.innerHTML = `<div class="d-flex"><div class="toast-body">${msg}</div><button class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>`;
            document.getElementById('toastContainer').appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }

        function formatNumber(n) { return n != null ? Number(n).toFixed(2) : '-'; }
        function formatPct(n) { return n != null ? (n>0?'+':'')+Number(n).toFixed(2)+'%' : '-'; }
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
